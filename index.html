<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLAP.TOP - 张国荣·顶级</title>
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/i18n.css">
</head>

<body>
    <!-- 全屏背景视频 -->
    <video id="bgVideo" autoplay muted loop>
        <source src="https://xlaptop.oss-cn-hongkong.aliyuncs.com/bg.mp4" type="video/mp4">
        <span>您的浏览器不支持视频标签。</span>
    </video>

    <!-- 遮罩层 -->
    <div class="overlay"></div>

    <!-- 抽屉切换按钮 -->
    <div class="drawer-toggle" id="drawerToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"></path>
        </svg>
    </div>

    <!-- 电影抽屉 -->
    <div class="movie-drawer" id="movieDrawer">
        <div class="drawer-content">
            <div class="drawer-header">
                <h3>电影</h3>
            </div>
            <div class="movie-list" id="movieList">
                <!-- 电影列表将通过JavaScript动态加载 -->
            </div>
        </div>
    </div>

    <!-- 主要内容 -->
    <main class="content">
        <div class="hero-section">
            <h1 class="site-title">
                <span class="typing-text" id="typingText"></span>
                <img src="assets/img/qq_wb_icon.png" alt="QQ五笔" class="wb-icon">
            </h1>
            <div class="subtitle">张国荣·顶级</div>
            <div class="memorial-text">
                <p class="dates">1956.9.12 - 2003.4.1</p>
                <p class="quote">"我就是我，是颜色不一样的烟火"</p>
            </div>
        </div>

        <!-- 音乐播放器 -->
        <div class="music-player">
            <div class="music-player-inner">
                <div class="music-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path id="musicPlayBtn" d="M10 8l6 4-6 4V8z"></path>
                        <path id="musicPauseBtn" class="hidden" d="M10 8h0v8h0V8zM14 8h0v8h0V8z"></path>
                    </svg>
                </div>
                <div class="music-info">
                    <div class="music-name">加载中...</div>
                    <div class="music-progress">
                        <div class="music-progress-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部信息 -->
        <footer class="footer">
            <p>永远怀念 • Forever in Our Hearts</p>
        </footer>
    </main>

    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
